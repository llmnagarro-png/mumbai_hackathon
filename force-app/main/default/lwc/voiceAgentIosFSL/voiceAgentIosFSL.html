<template>

<div class={deviceClass}>
    
    <template if:true={isListeningMode}>
    <div class="voice-overlay">
        
        <button class="voice-cancel-btn-top" onclick={switchToChat} aria-label="Cancel voice input">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
        </button>

        
        <div class="voice-status">{statusText}</div>

        
        <template if:true={hasVoiceMapCards}>
            <div class="voice-map-section">
                <div class="voice-map-row">
                    <template for:each={voiceMapCards} for:item="card">
                        <div key={card.id} class="voice-map-tile" data-url={card.url} onclick={handleOpenLocation}>
                            
                            <button class="voice-map-tile-close" data-id={card.id} onclick={dismissVoiceMapCard} aria-label="Dismiss">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="8" height="8" fill="currentColor" aria-hidden="true">
                                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                                </svg>
                            </button>
                            
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" class="voice-map-tile-pin">
                                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                            </svg>
                            
                            <span class="voice-map-tile-name">{card.name}</span>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        
        <template if:true={pendingImagePreview}>
            <div class="voice-pending-preview">
                <div class="voice-pending-wrap">
                    <img src={pendingImagePreview} class="voice-pending-img" alt="Image preview" />
                    <button class="voice-remove-pending-btn" onclick={removePendingImage} aria-label="Remove image">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="12" height="12" fill="currentColor" aria-hidden="true">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                    </button>
                </div>
                <p class="voice-pending-hint">Speak to describe &amp; send</p>
            </div>
        </template>

        
        <div class="voice-spacer"></div>

        
        <div class="amplitude-container">
            <div class={amplitudeBarsClass}>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
                <span class="amplitude-bar"></span>
            </div>
        </div>

        
        <div class="voice-attach-container">
            <button class="voice-attach-btn" onclick={toggleVoiceAttachMenu} aria-label="Attach image" title="Attach image">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                </svg>
            </button>
            <template if:true={showVoiceAttachMenu}>
                <div class="attach-backdrop" onclick={closeVoiceAttachMenu}></div>
                <div class="voice-attach-popover" role="menu">
                    <div class="attach-option" role="menuitem">
                        <input type="file" accept="image/*" onchange={handleVoiceGallerySelect} class="file-overlay-input" />
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                        </svg>
                        <span>Gallery</span>
                    </div>
                    <div class="attach-option" role="menuitem">
                        <input type="file" accept="image/*" capture="environment" onchange={handleVoiceCameraSelect} class="file-overlay-input" />
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                            <path d="M12 15.2c1.77 0 3.2-1.43 3.2-3.2S13.77 8.8 12 8.8 8.8 10.23 8.8 12s1.43 3.2 3.2 3.2zM9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                        </svg>
                        <span>Camera</span>
                    </div>
                </div>
            </template>
        </div>
    </div>
    </template>

    
    <template if:true={showSettings}>
        <div class="settings-modal">
            <lightning-combobox name="Select Language" label="Select Language" value={selectedLanguage}
                placeholder="Select Language" options={languageOptions}
                onchange={handleLanguageChange}></lightning-combobox>
        </div>
    </template>

    <div class="chat-header">
        <div class="header-content">
            <div class="header-text">
                <div class="header-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" class="agent-icon" aria-hidden="true">
                        <path d="M20 9V7c0-1.1-.9-2-2-2h-3c0-1.66-1.34-3-3-3S9 3.34 9 5H6c-1.1 0-2 .9-2 2v2c-1.66 0-3 1.34-3 3s1.34 3 3 3v4c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4c1.66 0 3-1.34 3-3s-1.34-3-3-3zM7.5 11.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S9.83 13 9 13s-1.5-.67-1.5-1.5zM16 17H8v-2h8v2zm-1-4c-.83 0-1.5-.67-1.5-1.5S14.17 10 15 10s1.5.67 1.5 1.5S15.83 13 15 13z"/>
                    </svg>
                    <span>Retail Assist</span>
                </div>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-action-btn" aria-label="Settings" onclick={toggleSettings} style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="chat-messages scrollable">
        <template for:each={formattedMessages} for:item="msg">
            <div key={msg.id} class={msg.bubbleClass}>
                <div class="message-content" if:false={msg.isImage}>
                     
                    <div class="message-text">
                        <template for:each={msg.textSegments} for:item="seg">
                            <span key={seg.id} class={seg.spanClass} data-url={seg.url} onclick={handleLinkClick}>{seg.text}</span>
                        </template>
                    </div>
                    <template if:true={msg.hasMapUrls}>
                        <div class="chat-map-links">
                            <template for:each={msg.mapUrls} for:item="mapItem">
                                <button key={mapItem.id} class="chat-map-btn" data-url={mapItem.url} onclick={handleOpenLocation}>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true" class="chat-map-pin-icon">
                                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                                    </svg>
                                    <span class="chat-map-btn-label">{mapItem.name}</span>
                                </button>
                            </template>
                        </div>
                    </template>
                    <template if:true={msg.hasLinkUrls}>
                        <div class="chat-link-buttons">
                            <template for:each={msg.linkUrls} for:item="linkItem">
                                <button key={linkItem.id} class="chat-link-btn" data-url={linkItem.url} onclick={handleLinkClick}>
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true" class="chat-link-icon">
                                        <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
                                    </svg>
                                    <span class="chat-link-btn-label">{linkItem.url}</span>
                                </button>
                            </template>
                        </div>
                    </template>
                    <div class="message-time">{msg.time}</div>
                    
                </div>
                <div class="message-content" if:true={msg.isImage}>
                    <div class="message-img-wrap">
                        <img src={msg.imageUrl} class="message-img" alt="Sent image" />
                    </div>
                    <template if:true={msg.text}>
                        <div class="message-text">
                            <template for:each={msg.textSegments} for:item="seg">
                                <span key={seg.id} class={seg.spanClass} data-url={seg.url} onclick={handleLinkClick}>{seg.text}</span>
                            </template>
                        </div>
                    </template>
                    <div class="message-time">{msg.time}</div>
                </div>
            </div>
        </template>

        <template if:true={isProcessing}>
            <div class="agent-msg typing-indicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </template>
    </div>

    <div class="chat-input-area">
        <template if:true={pendingImageBase64}>
            <div class="pending-image-row">
                <div class="pending-image-wrap">
                    <img src={pendingImagePreview} class="pending-image-thumb" alt="Image to send" />
                    <button class="remove-pending-btn" onclick={removePendingImage} aria-label="Remove image">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </template>
        <div class="chat-input-container flex-row">
        <div class="input-wrapper">
            <input type="text" class="chat-input" value={userInput} placeholder="Message to Retail Assist..."
                onkeydown={handleKeyPress} />
        </div>
        
        
        <button class="input-action-btn input-mic-btn" onclick={switchToListening} aria-label="Start voice input" title="Voice Input">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V19c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
            </svg>
        </button>
        
        
        <template if:false={isListeningMode}>
            <div class="input-attach-container">
                <button class="input-action-btn input-attach-btn" onclick={toggleAttachMenu} title="Attach Image" aria-label="Attach image">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                        <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/>
                    </svg>
                </button>
                <template if:true={showAttachMenu}>
                    <div class="attach-backdrop" onclick={closeAttachMenu}></div>
                    <div class="attach-popover" role="menu">
                        <div class="attach-option" role="menuitem">
                            <input type="file" accept="image/*" onchange={handleGallerySelect} class="file-overlay-input" />
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                            </svg>
                            <span>Gallery</span>
                        </div>
                        <div class="attach-option" role="menuitem">
                            <input type="file" accept="image/*" capture="environment" onchange={handleCameraSelect} class="file-overlay-input" />
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                                <path d="M12 15.2c1.77 0 3.2-1.43 3.2-3.2S13.77 8.8 12 8.8 8.8 10.23 8.8 12s1.43 3.2 3.2 3.2zM9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
                            </svg>
                            <span>Camera</span>
                        </div>
                    </div>
                </template>
            </div>
        </template>

        
        <button class="chat-send-button" onclick={handleSend} aria-label="Send message" title="Send">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </button>
    </div>
    </div>
    
</div>

</template>
